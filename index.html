<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My App</title>
  <style>
    /* Center everything and set black background */
    body { 
      font-family: system-ui, Arial, sans-serif; 
      margin: 0; 
      height: 100vh;                 /* full viewport height */
      display: flex; 
      justify-content: center;       /* horizontal center */
      align-items: center;           /* vertical center */
      background-color: black;       /* black background */
      color: white;                  /* make text white for contrast */
    }

    .container {
      text-align: center;
      background: #1e1e1e;           /* dark gray panel */
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    h1 { margin-bottom: 0.25rem; }
    p  { color: #ccc; }
    form { margin-top: 1rem; display: grid; gap: 0.5rem; max-width: 280px; margin-left: auto; margin-right: auto; }
    input, button { padding: 0.5rem; border-radius: 6px; border: none; }
    button { background: #4CAF50; color: white; cursor: pointer; }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <div class="container">
    <h1>My App</h1>
    <p>Welcome to the main branch.</p>

    <!-- 🔹 New in feature-login -->
    <h2>Login</h2>
    <form id="loginForm">
      <input id="username" type="text" placeholder="Username" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      alert(`Logged in as: ${user || 'guest'}`);
    });
  </script>
</body>
</html>
