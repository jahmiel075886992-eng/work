<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My App</title>
  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      margin: 0; 
      height: 100vh;                 
      display: flex; 
      justify-content: center;       
      align-items: center;           
      background-color: black;       
      color: white;                  
    }

    .container {
      text-align: center;
      background: #1e1e1e;           
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    h1 { margin-bottom: 0.25rem; }
    p  { color: #ccc; }
    form { margin-top: 1rem; display: grid; gap: 0.5rem; max-width: 280px; margin-left: auto; margin-right: auto; }
    input, button { padding: 0.5rem; border-radius: 6px; border: none; }
    button { background: #4CAF50; color: white; cursor: pointer; }
    button:hover { background: #45a049; }

    /* style for background button */
    #bgButton { 
      margin-top: 1rem; 
      background: #007BFF; 
    }
    #bgButton:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>My App</h1>
    <p>Welcome to the main branch.</p>

    <h2>Login</h2>
    <form id="loginForm">
      <input id="username" type="text" placeholder="Username" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>

    <!-- 🔹 New button -->
    <button id="bgButton" type="button">Change Background</button>
  </div>

  <script>
    // Login form script
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      alert(`Logged in as: ${user || 'guest'}`);
    });

    // Background changer script
    const colors = ["black", "darkred", "darkblue", "darkgreen", "purple", "darkorange"];
    document.getElementById('bgButton').addEventListener('click', () => {
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      document.body.style.backgroundColor = randomColor;
    });
  </script>
</body>
</html>
